[pytest]
# Discover tests only under this package
testpaths = tests

# Project root on Python path so `pages`, `utils`, `src` import cleanly
pythonpath = .

# Default CLI options (override with: pytest --no-cov ...)
addopts =
    -ra
    --strict-markers
    --tb=short
    --html=reports/report.html
    --self-contained-html

# Register custom markers (avoids typos and documents intent)
markers =
    smoke: Quick sanity checks; run in CI on every PR
    regression: Broader coverage; run nightly or before release
    e2e: End-to-end flows through the UI

# Minimum pytest version (optional)
minversion = 7.0
